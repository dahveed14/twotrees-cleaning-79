name: SSG Build (Vite + React)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # Use non-strict install to bypass lockfile mismatch
      - name: Install deps
        run: npm install --no-audit --no-fund | tee install.log

      - name: Show environment
        run: |
          node -v | tee -a env.log
          npm -v | tee -a env.log
          echo "PWD=$(pwd)" | tee -a env.log
          ls -la | tee -a env.log

      - name: Build client
        run: |
          npm run build:client | tee build-client.log
          echo "--- dist listing after client ---" | tee -a build-client.log
          ls -la dist | tee -a build-client.log

      - name: Build server (SSR bundle)
        run: |
          npm run build:server | tee build-server.log
          echo "--- dist/server listing ---" | tee -a build-server.log
          ls -la dist/server | tee -a build-server.log

      - name: Prerender routes
        run: |
          node prerender.js | tee prerender.log
          echo "--- dist tree after prerender ---" | tee -a prerender.log
          find dist -maxdepth 3 -type f | sort | tee -a prerender.log

      # Always upload logs so we can debug failures
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            install.log
            env.log
            build-client.log
            build-server.log
            prerender.log
          if-no-files-found: warn

      - name: Upload dist (artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
