kground: var(--white); border-bottom: 1px solid var(--color-border-subtle);\">\n    <img src=\"0dda0aff-a277-43f5-89c2-c7b766cad93e\" alt=\"Two Trees Cleaning\" style=\"height: 44px; width: auto;\">\n    <a href=\"tel:+18054365868\" style=\"font-weight:600; font-size: var(--text-sm); color: var(--forest-800); text-decoration:none;\">(805) 436-5868<\u002Fa>\n  <\u002Fheader>\n\n  <section style=\"text-align:center; padding: 64px 6vw 56px; background: linear-gradient(180deg, var(--forest-50), var(--white));\">\n    <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.Badge\" variant=\"gold\" hint-size=\"auto,32px\"><span>Offer ends {{ offerDeadlineLabel }}<\u002Fspan><\u002Fx-import>\n    <h1 style=\"font-family: var(--font-display); font-size: clamp(36px, 5vw, 56px); line-height:1.1; color: var(--forest-900); margin: 20px auto 16px; max-width: 780px;\">Refer a friend. Get a ${{ rewardAmount }} Wood Ranch gift card.<\u002Fh1>\n    <p style=\"font-size: var(--text-lg); color: var(--color-text-secondary); max-width: 620px; margin: 0 auto 32px; line-height:1.6;\">Know a family who'd love coming home to a spotless house? Send them our way - once they've been a regular customer for {{ qualifyingVisits }} visits, we'll send you a ${{ rewardAmount }} gift card to Wood Ranch. No limit on how many friends you refer.<\u002Fp>\n    <div style=\"display:flex; gap:16px; justify-content:center; flex-wrap:wrap;\">\n      <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.Button\" variant=\"primary\" size=\"lg\" sc-camel-on-click=\"{{ scrollToForm }}\" hint-size=\"auto,52px\">Refer a Friend<\u002Fx-import>\n      <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.Button\" variant=\"outline\" size=\"lg\" sc-camel-on-click=\"{{ scrollToHow }}\" hint-size=\"auto,52px\">How It Works<\u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section ref=\"{{ howRef }}\" style=\"padding: 72px 6vw; max-width: 1100px; margin: 0 auto;\">\n    <h2 style=\"text-align:center; font-family: var(--font-display); font-size: var(--text-3xl); color: var(--forest-900); margin: 0 0 48px;\">How the referral reward works<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 32px;\">\n      <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.Card\" hint-size=\"100%,260px\">\n        <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.CardContent\" style=\"{{ centerContentStyle }}\" hint-size=\"100%,260px\">\n          <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.CardIcon\" tone=\"forest\" hint-size=\"56px,56px\">\n            <svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M22 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg>\n          <\u002Fx-import>\n          <h3 style=\"font-size: var(--text-lg); color: var(--forest-900); margin: 0 0 8px;\">1. Tell us about your friend<\u002Fh3>\n          <p style=\"color: var(--color-text-secondary); margin:0; line-height:1.6;\">Fill out the short form below with their name and contact info - takes less than a minute.<\u002Fp>\n        <\u002Fx-import>\n      <\u002Fx-import>\n      <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.Card\" hint-size=\"100%,260px\">\n        <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.CardContent\" style=\"{{ centerContentStyle }}\" hint-size=\"100%,260px\">\n          <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.CardIcon\" tone=\"forest\" hint-size=\"56px,56px\">\n            <svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><line x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\"><\u002Fline><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"6\"><\u002Fline><line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"><\u002Fline><\u002Fsvg>\n          <\u002Fx-import>\n          <h3 style=\"font-size: var(--text-lg); color: var(--forest-900); margin: 0 0 8px;\">2. We reach out &amp; they book<\u002Fh3>\n          <p style=\"color: var(--color-text-secondary); margin:0; line-height:1.6;\">We'll contact your friend to schedule their first clean and get them set up as a recurring customer.<\u002Fp>\n        <\u002Fx-import>\n      <\u002Fx-import>\n      <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.Card\" hint-size=\"100%,260px\">\n        <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.CardContent\" style=\"{{ centerContentStyle }}\" hint-size=\"100%,260px\">\n          <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.CardIcon\" tone=\"gold\" hint-size=\"56px,56px\">\n            <svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 12v8H4v-8\"><\u002Fpath><path d=\"M2 7h20v5H2z\"><\u002Fpath><path d=\"M12 22V7\"><\u002Fpath><path d=\"M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z\"><\u002Fpath><path d=\"M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fx-import>\n          <h3 style=\"font-size: var(--text-lg); color: var(--forest-900); margin: 0 0 8px;\">3. You get rewarded<\u002Fh3>\n          <p style=\"color: var(--color-text-secondary); margin:0; line-height:1.6;\">Once they've completed {{ qualifyingVisits }} recurring visits within {{ qualifyingWindowMonths }} months, we'll send you a ${{ rewardAmount }} Wood Ranch gift card. Refer as many friends as you like.<\u002Fp>\n        <\u002Fx-import>\n      <\u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"background: var(--forest-800); color: var(--paper); padding: 56px 6vw; text-align:center;\">\n    <p style=\"text-transform:uppercase; letter-spacing: 0.08em; font-size: var(--text-xs); color: var(--gold-400); margin: 0 0 12px; font-weight:600;\">Your reward<\u002Fp>\n    <h2 style=\"font-family: var(--font-display); font-size: clamp(32px, 4vw, 44px); margin: 0 0 12px;\">${{ rewardAmount }} Wood Ranch Gift Card<\u002Fh2>\n    <p style=\"max-width: 520px; margin: 0 auto; color: var(--stone-200); line-height:1.6;\">For every friend who becomes a recurring Two Trees customer. No cap - refer 5 friends, earn 5 gift cards.<\u002Fp>\n  <\u002Fsection>\n\n  <section ref=\"{{ formRef }}\" style=\"padding: 72px 6vw; max-width: 720px; margin: 0 auto;\">\n    <h2 style=\"text-align:center; font-family: var(--font-display); font-size: var(--text-3xl); color: var(--forest-900); margin: 0 0 8px;\">Refer a friend<\u002Fh2>\n    <p style=\"text-align:center; color: var(--color-text-secondary); margin: 0 0 32px;\">Fill out the form and we'll reach out to them directly - or send them a heads-up text yourself first.<\u002Fp>\n\n    <div style=\"display:flex; justify-content:center; margin: 0 0 40px;\">\n      <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.Button\" variant=\"outline\" size=\"md\" sc-camel-on-click=\"{{ textFriend }}\" hint-size=\"auto,44px\">\n        <span style=\"display:inline-flex; align-items:center; gap:8px;\">\n          <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n          <span>{{ copyButtonLabel }}<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fx-import>\n    <\u002Fdiv>\n\n    <iframe src=\"https://links.twotreescleaning.com/widget/form/2vrycbNhglWxO1XEgJ54\" style=\"width:100%; height:472px; border:none; border-radius:10px\" id=\"inline-2vrycbNhglWxO1XEgJ54\" data-layout=\"{'id':'INLINE'}\" data-trigger-type=\"alwaysShow\" data-trigger-value=\"\" data-activation-type=\"alwaysActivated\" data-activation-value=\"\" data-deactivation-type=\"neverDeactivate\" data-deactivation-value=\"\" data-form-name=\"Refer a Friend Form\" data-height=\"472\" data-layout-iframe-id=\"inline-2vrycbNhglWxO1XEgJ54\" data-form-id=\"2vrycbNhglWxO1XEgJ54\" title=\"Refer a Friend Form\"><\u002Fiframe>\n    <p style=\"text-align:center; font-size: var(--text-xs); color: var(--color-text-secondary); margin: 16px 0 0;\">By submitting, you agree that the reward is sent after your friend completes {{ qualifyingVisits }} recurring visits. See <a href=\"#terms\">terms &amp; conditions<\u002Fa>.<\u002Fp>\n  <\u002Fsection>\n\n  <section id=\"terms\" style=\"background: var(--stone-100); padding: 72px 6vw;\">\n    <div style=\"max-width: 720px; margin: 0 auto;\">\n      <h2 style=\"font-family: var(--font-display); font-size: var(--text-3xl); color: var(--forest-900); margin: 0 0 24px; text-align:center;\">Terms &amp; conditions<\u002Fh2>\n      <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.Card\" hint-size=\"100%,400px\">\n        <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.CardContent\" hint-size=\"100%,400px\">\n          <ul style=\"margin:0; padding-left: 20px; color: var(--color-text-secondary); line-height:1.8; font-size: var(--text-sm);\">\n            <li>Referred friend must be a new Two Trees Cleaning customer - no prior bookings with us.<\u002Fli>\n            <li>Reward is issued after the referred customer completes {{ qualifyingVisits }} recurring cleanings within {{ qualifyingWindowMonths }} months of their first visit.<\u002Fli>\n            <li>Referral must be submitted, and the friend's first booking made, by {{ offerDeadlineLabel }}.<\u002Fli>\n            <li>No limit on referrals - earn one ${{ rewardAmount }} Wood Ranch gift card for every friend who qualifies.<\u002Fli>\n            <li>One gift card per referred household. Referred friend cannot be a current or former Two Trees customer, or a member of the referrer's immediate household.<\u002Fli>\n            <li>Gift card is sent by mail or digitally within 2 weeks of the referred customer's {{ qualifyingVisits }}th visit.<\u002Fli>\n            <li>Reward has no cash value and is not transferable. Two Trees Cleaning is not affiliated with Wood Ranch Restaurants.<\u002Fli>\n            <li>Two Trees Cleaning reserves the right to verify qualifying visits and to modify or end this promotion at any time.<\u002Fli>\n          <\u002Ful>\n        <\u002Fx-import>\n      <\u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"padding: 72px 6vw; max-width: 780px; margin: 0 auto;\">\n    <h2 style=\"text-align:center; font-family: var(--font-display); font-size: var(--text-3xl); color: var(--forest-900); margin: 0 0 40px;\">Frequently asked questions<\u002Fh2>\n    <x-import component-from-global-scope=\"TwoTreesCleaningDesignSystem_a13e76.Accordion\" items=\"{{ faqItems }}\" hint-size=\"100%,400px\"><\u002Fx-import>\n  <\u002Fsection>\n\n  <footer style=\"background: var(--forest-900); color: var(--stone-200); padding: 40px 6vw; text-align:center; font-size: var(--text-xs);\">\n    <p style=\"margin:0 0 8px;\">Two Trees Cleaning · Ventura &amp; Santa Barbara Counties · <a href=\"tel:+18054365868\" style=\"color: var(--gold-400);\">(805) 436-5868<\u002Fa><\u002Fp>\n    <p style=\"margin:0; color: var(--stone-400);\">Referral offer valid through {{ offerDeadlineLabel }}. See full terms above.<\u002Fp>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 900}, &quot;rewardAmount&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 100, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 25, &quot;max&quot;: 500, &quot;step&quot;: 25, &quot;section&quot;: &quot;Offer&quot;}, &quot;qualifyingVisits&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 4, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 1, &quot;max&quot;: 12, &quot;section&quot;: &quot;Offer&quot;}, &quot;qualifyingWindowMonths&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 4, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 1, &quot;max&quot;: 12, &quot;section&quot;: &quot;Offer&quot;}, &quot;offerDeadlineLabel&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;September 30, 2026&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Offer&quot;}}\">\n\nfunction buildFaqItems(rewardAmount, qualifyingVisits, qualifyingWindowMonths, offerDeadlineLabel) {\n  return [\n    { question: \"How do I know if my referral qualifies?\", answer: \"We track each referred customer's visit history and confirm once they've completed \" + qualifyingVisits + \" recurring cleanings within \" + qualifyingWindowMonths + \" months of their first booking. We'll reach out to you directly when it's confirmed.\" },\n    { question: \"When will I receive my gift card?\", answer: \"Within two weeks of your friend's \" + qualifyingVisits + \"th visit, we'll send your $\" + rewardAmount + \" Wood Ranch gift card by mail or digitally, whichever you prefer.\" },\n    { question: \"Is there a limit to how many friends I can refer?\", answer: \"No limit. Refer as many friends as you like, you earn a separate gift card for every one who qualifies.\" },\n    { question: \"What if my friend has used Two Trees before?\", answer: \"This offer is for new customers only. Friends who are current or former Two Trees customers, or who live in your household, do not qualify.\" },\n    { question: \"What is the deadline?\", answer: \"Submit your referral and have your friend book their first clean by \" + offerDeadlineLabel + \". The \" + qualifyingVisits + \"-visit qualifying period can extend past that date.\" }\n  ];\n}\n\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      formVals: { yourName: \"\", yourPhone: \"\", friendName: \"\", friendPhone: \"\", friendEmail: \"\", agreed: false },\n      submitted: false,\n      copied: false\n    };\n    this.howRef = React.createRef();\n    this.formRef = React.createRef();\n    this.scrollTo = this.scrollTo.bind(this);\n    this.scrollToHow = this.scrollToHow.bind(this);\n    this.scrollToForm = this.scrollToForm.bind(this);\n    this.setField = this.setField.bind(this);\n    this.setAgreed = this.setAgreed.bind(this);\n    this.handleSubmit = this.handleSubmit.bind(this);\n    this.resetForm = this.resetForm.bind(this);\n    this.textFriend = this.textFriend.bind(this);\n  }\n\n  textFriend() {\n    var self = this;\n    var rewardAmount = this.props.rewardAmount != null ? this.props.rewardAmount : 100;\n    var qualifyingVisits = this.props.qualifyingVisits != null ? this.props.qualifyingVisits : 4;\n    var offerDeadlineLabel = this.props.offerDeadlineLabel != null ? this.props.offerDeadlineLabel : \"September 30, 2026\";\n    var msg = \"Hey! Two Trees Cleaning is offering me a $\" + rewardAmount + \" Wood Ranch gift card if I refer you and you become a regular customer (\" + qualifyingVisits + \" visits). Want me to pass your info along? Offer ends \" + offerDeadlineLabel + \".\";\n    if (navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(msg).then(function () {\n        self.setState({ copied: true });\n        setTimeout(function () { self.setState({ copied: false }); }, 2000);\n      });\n    }\n  }\n\n  scrollTo(node) {\n    if (!node) { return; }\n    var top = node.getBoundingClientRect().top + window.pageYOffset - 20;\n    window.scrollTo({ top: top, behavior: \"smooth\" });\n  }\n  scrollToHow() { this.scrollTo(this.howRef.current); }\n  scrollToForm() { this.scrollTo(this.formRef.current); }\n\n  setField(key) {\n    var self = this;\n    return function (e) {\n      var val = e.target.value;\n      self.setState(function (s) {\n        var next = Object.assign({}, s.formVals);\n        next[key] = val;\n        return { formVals: next };\n      });\n    };\n  }\n\n  setAgreed(e) {\n    var checked = e.target.checked;\n    this.setState(function (s) {\n      return { formVals: Object.assign({}, s.formVals, { agreed: checked }) };\n    });\n  }\n\n  handleSubmit(e) {\n    e.preventDefault();\n    this.setState({ submitted: true });\n  }\n\n  resetForm() {\n    this.setState({\n      formVals: { yourName: \"\", yourPhone: \"\", friendName: \"\", friendPhone: \"\", friendEmail: \"\", agreed: false },\n      submitted: false\n    });\n  }\n\n  renderVals() {\n    var rewardAmount = this.props.rewardAmount != null ? this.props.rewardAmount : 100;\n    var qualifyingVisits = this.props.qualifyingVisits != null ? this.props.qualifyingVisits : 4;\n    var qualifyingWindowMonths = this.props.qualifyingWindowMonths != null ? this.props.qualifyingWindowMonths : 4;\n    var offerDeadlineLabel = this.props.offerDeadlineLabel != null ? this.props.offerDeadlineLabel : \"September 30, 2026\";\n\n    return {\n      rewardAmount: rewardAmount,\n      qualifyingVisits: qualifyingVisits,\n      qualifyingWindowMonths: qualifyingWindowMonths,\n      offerDeadlineLabel: offerDeadlineLabel,\n      formVals: this.state.formVals,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      howRef: this.howRef,\n      formRef: this.formRef,\n      scrollToHow: this.scrollToHow,\n      scrollToForm: this.scrollToForm,\n      setYourName: this.setField(\"yourName\"),\n      setYourPhone: this.setField(\"yourPhone\"),\n      setFriendName: this.setField(\"friendName\"),\n      setFriendPhone: this.setField(\"friendPhone\"),\n      setFriendEmail: this.setField(\"friendEmail\"),\n      setAgreed: this.setAgreed,\n      handleSubmit: this.handleSubmit,\n      resetForm: this.resetForm,\n      textFriend: this.textFriend,\n      copyButtonLabel: this.state.copied ? \"Copied! Paste it in a text\" : \"Copy a Message to Send\",\n      centerContentStyle: { textAlign: \"center\", display: \"flex\", flexDirection: \"column\", alignItems: \"center\" },\n      faqItems: buildFaqItems(rewardAmount, qualifyingVisits, qualifyingWindowMonths, offerDeadlineLabel)\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
