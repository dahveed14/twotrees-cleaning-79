    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Two Trees Cleaning - Professional House Cleaning" />

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2QNHXH7QRD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      
      gtag('config', 'G-2QNHXH7QRD', {
        page_title: 'Two Trees Cleaning Landing Page',
        custom_map: {
          'custom_parameter_1': 'utm_source',
          'custom_parameter_2': 'utm_medium', 
          'custom_parameter_3': 'utm_campaign'
        }
      });

      // UTM Parameter tracking
      function captureUTMParameters() {
        const urlParams = new URLSearchParams(window.location.search);
        const utmData = {
          utm_source: urlParams.get('utm_source'),
          utm_medium: urlParams.get('utm_medium'),
          utm_campaign: urlParams.get('utm_campaign'),
          utm_term: urlParams.get('utm_term'),
          utm_content: urlParams.get('utm_content')
        };
        
        // Store UTM data in sessionStorage for form submissions
        sessionStorage.setItem('utmData', JSON.stringify(utmData));
        
        // Send UTM data to GA4
        if (utmData.utm_source || utmData.utm_medium || utmData.utm_campaign) {
          gtag('event', 'utm_capture', {
            utm_source: utmData.utm_source,
            utm_medium: utmData.utm_medium,
            utm_campaign: utmData.utm_campaign,
            utm_term: utmData.utm_term,
            utm_content: utmData.utm_content
          });
        }
      }

      // Track conversion events
      function trackConversion(action, location) {
        gtag('event', 'conversion', {
          event_category: 'Two Trees Cleaning',
          event_label: action,
          custom_parameter_1: location,
          value: 1
        });
      }

      // Track button clicks
      function trackButtonClick(buttonText, location) {
        gtag('event', 'cta_click', {
          event_category: 'CTA',
          event_label: buttonText,
          custom_parameter_1: location
        });
        trackConversion('Book Cleaning Click', location);
      }

      // Capture UTM parameters on page load
      window.addEventListener('load', captureUTMParameters);
    </script>
  </head>

  <body>
    <div id="root"></div>

  </body>
